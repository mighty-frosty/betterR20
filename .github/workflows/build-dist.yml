name: Build Dist

on:
  push:
    branches:
      - development-jumpgate
      - main-jumpgate

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          BASE=$(grep -oP '(?<=process\.env\.SCRIPT_VERSION \|\| ")[^"]+' node/build-scripts.js)
          if [ "${{ github.ref_name }}" = "development-jumpgate" ]; then
            echo "SCRIPT_VERSION=${BASE}-testing" >> "$GITHUB_ENV"
          else
            echo "SCRIPT_VERSION=${BASE}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build dist v${{ env.SCRIPT_VERSION }} [skip ci]"
          git push
