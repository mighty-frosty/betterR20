name: Build Dist

on:
  push:
    branches:
      - main-jumpgate
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version and repo URL
        run: |
          BASE=$(grep -oP '(?<=process\.env\.SCRIPT_VERSION \|\| ")[^"]+' node/build-scripts.js)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            echo "SCRIPT_VERSION=${VERSION#v}" >> "$GITHUB_ENV"
            echo "SCRIPT_REPO=https://github.com/mighty-frosty/betterR20/releases/latest/download/" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          else
            echo "SCRIPT_VERSION=${BASE}-testing" >> "$GITHUB_ENV"
            echo "SCRIPT_REPO=https://github.com/mighty-frosty/betterR20/releases/download/testing/" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=testing" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Delete existing testing release
        if: env.IS_PRERELEASE == 'true'
        run: gh release delete testing --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          if [ "${{ env.IS_PRERELEASE }}" = "true" ]; then
            gh release create "testing" dist/* \
              --title "Testing Build v${{ env.SCRIPT_VERSION }}" \
              --prerelease \
              --notes "Latest testing build from main-jumpgate. Updated automatically on every push."
          else
            gh release create "${{ env.RELEASE_TAG }}" dist/* \
              --title "Release ${{ env.RELEASE_TAG }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
