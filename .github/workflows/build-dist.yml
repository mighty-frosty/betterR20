name: Build Dist

on:
  push:
    branches:
      - development-jumpgate
    tags:
      - 'v*'

jobs:
  build-testing:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        run: |
          BASE=$(grep -oP '(?<=process\.env\.SCRIPT_VERSION \|\| ")[^"]+' node/build-scripts.js)
          echo "SCRIPT_VERSION=${BASE}-testing" >> "$GITHUB_ENV"
          echo "SCRIPT_REPO=https://mighty-frosty.github.io/betterR20/" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4

  build-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "SCRIPT_VERSION=${VERSION#v}" >> "$GITHUB_ENV"
          echo "SCRIPT_REPO=https://github.com/mighty-frosty/betterR20/releases/latest/download/" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
